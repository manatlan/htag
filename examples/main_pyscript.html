<!DOCTYPE html>
<html lang="en">
<!--
to test this file, run:

$ uv build

adapt line 30 to setup the wheel that was built by the previous command.

$ uv run python -m http.server

then open http://localhost:8000/examples/main_pyscript.html
-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htag with PyScript</title>
    <!-- PyScript styles and scripts -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
</head>

<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <h2>Loading htag PyScript App...</h2>
        <p>This may take a moment while Pyodide provisions the Python environment.</p>
    </div>

    <script type="py" config='{"packages":["../dist/htag-2.0.0-py3-none-any.whl", "starlette", "uvicorn"]}'>
        from htag import Tag, PyScript

        class CounterApp(Tag.App):
            def init(self):
                self.count = 0
                
                # Title
                self += Tag.h1("htag Counter in PyScript!")
                
                # Instruction
                self += Tag.p("This entire htag application runs fully in the browser via PyScript without any Python backend server.")
                
                # Interactive element
                self.btn = Tag.button("Increment: 0", _onclick=self.increment)
                self.btn["style"] = "padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; background: #3b82f6; color: white; border: none;"

                self <= Tag.button("Trigger Python Error", _class="btn", _onclick=self.trigger_py_error)
                

                # Centering wrapper
                wrapper = Tag.div(self.btn)
                wrapper["style"] = "display: flex; justify-content: center; align-items: center; padding: 20px;"
                
                self += wrapper
                
                # Add styles to App body
                self["style"] = "font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);"

                self["onhashchange"] = self.on_hash

                with Tag.div():
                    Tag.a("[P1]", _href="#page1")
                    Tag.a("[P2]", _href="#page2")

            def on_hash(self, ev):
                self <= Tag.div("hash changed to", ev.newURL)

            def increment(self, ev):
                self.count += 1
                self.btn.clear()
                self.btn += f"Increment: {self.count}"

            def trigger_py_error(self, event):
                raise ValueError("This is a deliberate Python backend error!")

        # Run the PyScript runner!
        # It replaces the current document.body with the App content.
        PyScript(CounterApp).run()
    </script>
</body>

</html>
